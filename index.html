<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★最新版★ 網走郵便ナビ</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="網走郵便">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#0284c7">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--primary); color: white; padding: 40px 20px 30px; text-align: center; }
        .content { padding: 25px; flex-grow: 1; }
        .loading { text-align: center; color: #64748b; padding: 40px; }
        .label { display: block; margin-bottom: 12px; color: #64748b; font-weight: bold; font-size: 0.9rem; }
        select { 
            width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 16px; 
            font-size: 1.1rem; background: #fff; cursor: pointer; appearance: none;
        }
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: "expand_more"; font-family: 'Material Icons Round';
            position: absolute; right: 15px; top: 18px; color: #94a3b8; pointer-events: none;
        }
        .result-card { 
            margin-top: 40px; padding: 35px 20px; border-radius: 24px; 
            background: #f0f9ff; border: 1px solid #bae6fd; text-align: center;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.08);
        }
        .zip-code { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; letter-spacing: -2px; }
        .copy-btn { 
            background: var(--primary); color: white; padding: 12px 30px; 
            border-radius: 50px; border: none; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.3);
        }
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; 
            border-radius: 50px; display: none; z-index: 1000;
        }
        /* アイコン画像のスタイルを追加 */
        .app-icon { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="favicon.png" alt="カニアイコン" class="app-icon">
        <h1 style="margin:10px 0 0; font-size: 1.6rem;">網走市 郵便番号</h1>
        <p style="margin:5px 0 0; font-size:0.85rem; opacity:0.9;">公式データ同期・自動検索</p>
    </div>

    <div class="content">
        <div id="loader" class="loading">
            <div style="font-size: 2rem; margin-bottom: 10px;">❄️</div>
            最新の網走市データを取得中...
        </div>
        
        <div id="ui" style="display:none;">
            <label class="label">町名（住所）を選んでください</label>
            <div class="select-wrapper">
                <select id="addressSelect" onchange="updateZip()"></select>
            </div>

            <div class="result-card">
                <div style="color: #64748b; font-size: 0.9rem; font-weight: bold;">POSTAL CODE</div>
                <div id="zipOutput" class="zip-code">〒--- ----</div>
                <button class="copy-btn" onclick="copyZip()">
                    <i class="material-icons-round">content_copy</i>番号をコピー
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">コピーしました！</div>

<script>
    window.onload = async function() {
        const select = document.getElementById('addressSelect');
        const loader = document.getElementById('loader');
        const ui = document.getElementById('ui');

        // 網走市の町名読み仮名完全マスター（五十音順）
        const kanaMap = {
            '卯原内': 'うばらない', '大曲': 'おおまがり',
            '海岸町': 'かいがん', '嘉多山': 'かたやま', '桂町': 'かつら', '金代': 'かなよ',
            '北': 'きた', '越歳': 'こしとし','駒場': 'こまば',
            '三眺': 'さんちょう', '潮見': 'しおみ', '昭和': 'しょうわ',
            '新町': 'しんまち','台町': 'だいまち',
            'つくしヶ丘': 'つくしがおか', '天都山': 'てんとざん', '豊里': 'とよさと', '中園': 'なかぞの',
            '能取': 'のとろ', '能取港町': 'のとろみなと', '東': 'ひがし', '二ツ岩': 'ふたついわ',
            '二見ヶ岡': 'ふたみがおか', '平和': 'へいわ', '鱒浦': 'ますうら', '美岬': 'みさき',
            '港町': 'みなと', '南': 'みなみ', '向陽ヶ丘': 'こうようがおか', '藻琴': 'もこと', '八坂': 'やさか',
            '呼人': 'よびと'
        };

        const kanjiNum = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };

        try {
            const response = await fetch('https://geoapi.heartrails.com/api/json?method=getTowns&city=%E7%B6%B2%E8%B5%B0%E5%B8%82');
            const data = await response.json();
            let towns = data.response.location;

            towns.sort((a, b) => {
                const getSortKey = (name) => {
                    let key = name;
                    // 1. 町名の漢字部分を読み（かな）に変換
                    for (let kanji in kanaMap) {
                        if (name.includes(kanji)) {
                            key = key.replace(kanji, kanaMap[kanji]);
                            break;
                        }
                    }
                    // 2. 漢数字を数字に変換（南二条 → 南2）
                    for (let kn in kanjiNum) {
                        key = key.replace(new RegExp(kn, 'g'), kanjiNum[kn]);
                    }
                    return key;
                };

                const keyA = getSortKey(a.town);
                const keyB = getSortKey(b.town);

                // numeric: true で数字（条数）を正しく比較
                return keyA.localeCompare(keyB, 'ja', { numeric: true });
            });

            select.innerHTML = '<option value="">▼ 町名を選択（五十音順）</option>';
            towns.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.postal;
                opt.textContent = item.town;
                select.appendChild(opt);
            });

            loader.style.display = 'none';
            ui.style.display = 'block';
        } catch (error) {
            loader.innerHTML = '<p style="color:red;">データの読み込みに失敗しました。</p>';
        }
    };

    function updateZip() {
        const val = document.getElementById('addressSelect').value;
        const out = document.getElementById('zipOutput');
        out.textContent = val ? "〒" + val.slice(0, 3) + "-" + val.slice(3) : "〒--- ----";
    }

    function copyZip() {
        const zip = document.getElementById('zipOutput').textContent.replace('〒', '');
        if (zip.includes('-')) {
            navigator.clipboard.writeText(zip).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        }
    }
</script>
    
</body>
</html>
